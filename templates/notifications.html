{% extends "base.html" %}

{% block stylesheets %}
<style>
    /* --- GRAIL THEME STANDARD (Matches Assignment Board) --- */
    
    /* 1. Page & Header Typography */
    .page-title {
        font-weight: 600;
        color: #333;
        margin: 0;
        font-size: 1.25rem;
    }

    .main-div {
        padding-bottom: 2rem;
    }

    /* 2. Spacing Helper for Alignment */
    .grail-header-area {
        padding-left: 1rem;
        padding-right: 1rem;
    }

    /* 3. The "Grail" Card Container */
    .grail-table-card {
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        border: 1px solid #f1f1f1;
        box-shadow: 0 5px 20px rgba(0,0,0,0.02); /* Subtle lift */
        height: 100%; /* Fill height for sidebar */
    }

    /* 4. Grail Gold Buttons */
    .btn-grail-gold-outline {
        background-color: transparent;
        color: #C89E47;
        border: 2px solid #C89E47;
        padding: 6px 20px;
        border-radius: 50px;
        font-weight: 500;
        font-size: 0.85rem;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .btn-grail-gold-outline:hover {
        background-color: #FFFBF0;
        color: #B08A3D;
        border-color: #B08A3D;
        transform: translateY(-1px);
    }

    .btn-white {
        background: #fff;
        border: 1px solid #e5e7eb;
        color: #374151;
        transition: all 0.2s;
    }
    .btn-white:hover {
        background: #f9fafb;
        border-color: #d1d5db;
        color: #111;
    }

    /* --- NOTIFICATION CENTER SPECIFIC STYLES --- */

    /* 5. Sidebar Navigation (Pills) */
    .nav-pills .nav-link {
        color: #6B7280;
        font-weight: 500;
        border-radius: 6px;
        margin-bottom: 8px;
        padding: 10px 15px;
        transition: all 0.2s;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .nav-pills .nav-link:hover {
        background-color: #F8FAFC;
        color: #333;
    }

    .nav-pills .nav-link.active {
        background-color: #FFFBF0 !important; /* Light Gold Background */
        color: #C89E47 !important;
        font-weight: 600;
        border-left: 3px solid #C89E47;
        border-top-left-radius: 4px;
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 5px rgba(200, 158, 71, 0.05);
    }

    .nav-pills .nav-link i {
        font-size: 1.1rem;
    }

    /* 6. List Items */
    .notification-page-item {
        border: none;
        border-bottom: 1px solid #f3f4f6;
        transition: background-color 0.2s ease;
        padding: 20px !important; /* Matches Grail Card padding */
    }

    .notification-page-item:last-child {
        border-bottom: none;
    }

    .notification-page-item:hover {
        background-color: #FAFAFA;
    }

    /* Unread State - Soft Gold Tint */
    .notification-page-item.unread {
        background-color: #FFFBF0; /* Very light gold */
    }

    .notification-page-item.unread h6 {
        color: #111 !important;
        font-weight: 700 !important;
    }

    /* 7. Badges & Icons */
    .bg-grail-gold {
        background-color: #C89E47;
    }

    /* Reuse Icon Colors from Base */
    .bg-soft-primary { background-color: #e3f2fd; color: #1976d2; } 
    .bg-soft-success { background-color: #e8f5e9; color: #2e7d32; } 
    .bg-soft-warning { background-color: #fff8e1; color: #f57c00; } 
    .bg-soft-danger  { background-color: #ffebee; color: #c62828; } 
    .bg-soft-info    { background-color: #e0f7fa; color: #0097a7; } 
    .bg-soft-secondary { background-color: #f5f5f5; color: #616161; }

    /* Loader */
    .spinner-gold {
        color: #C89E47;
    }
</style>
{% endblock stylesheets %}

{% block user_page %}
<div class="main-div">
    
    <div class="grail-header-area pt-3 px-3 d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="page-title">Notification Center</h2>
            <p class="text-muted small mb-0 mt-1">Manage your updates and alerts</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-white shadow-sm rounded-circle p-0 d-flex align-items-center justify-content-center" 
                    style="width: 36px; height: 36px;"
                    onclick="refreshNotifications()" title="Refresh">
                <i class="ri-refresh-line"></i>
            </button>
            <button class="btn btn-grail-gold-outline" onclick="markAllAsReadPage()">
                <i class="ri-check-double-line"></i> Mark all read
            </button>
        </div>
    </div>

    <div class="row g-4 px-3">
        
        <div class="col-lg-3">
            <div class="grail-table-card p-3">
                <h6 class="text-uppercase text-muted small fw-bold mb-3 px-2" style="letter-spacing: 0.5px;">Filters</h6>
                
                <div class="nav flex-column nav-pills" id="notif-filters">
                    <button class="nav-link active text-start" onclick="setFilter('all', this)">
                        <span class="d-flex align-items-center"><i class="ri-inbox-archive-line me-2"></i> All Notifications</span>
                    </button>
                    
                    <button class="nav-link text-start" onclick="setFilter('unread', this)">
                        <span class="d-flex align-items-center"><i class="ri-mail-unread-line me-2"></i> Unread</span>
                        <span class="badge bg-grail-gold text-white rounded-pill" id="page-unread-badge" style="display:none; font-size: 0.7rem;">0</span>
                    </button>
                    
                    <div class="my-3 border-top opacity-50"></div>
                    
                    <small class="text-muted px-2 pb-2 d-block text-uppercase fw-bold" style="font-size: 0.65rem;">Priority</small>
                    
                    <button class="nav-link text-start text-danger" onclick="setFilter('critical', this)">
                        <span class="d-flex align-items-center"><i class="ri-alarm-warning-line me-2"></i> Critical</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="col-lg-9">
            <div class="grail-table-card p-0 border-0 shadow-sm" style="overflow: hidden; min-height: 500px;">
                
                <div class="card-body p-0 position-relative h-100 d-flex flex-column">
                    
                    <ul class="list-group list-group-flush flex-grow-1 p-2" id="full-notification-list">
                        </ul>
                    
                    <div id="empty-state" class="text-center py-5 my-auto" style="display: none;">
                        <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                            <i class="ri-notification-off-line text-muted opacity-50" style="font-size: 2.5rem;"></i>
                        </div>
                        <h6 class="fw-bold text-dark mb-1">No notifications found</h6>
                        <p class="text-muted small">You are all caught up!</p>
                    </div>

                    <div id="page-loader" class="text-center py-5 my-auto">
                        <div class="spinner-border spinner-gold spinner-border-sm" role="status"></div>
                        <p class="small text-muted mt-2">Loading updates...</p>
                    </div>
                </div>
                
                <div class="p-3 text-center border-top bg-light">
                    <button class="btn btn-link text-muted text-decoration-none small fw-medium" 
                            id="btn-load-more" onclick="loadMoreNotifications()" style="display: none;">
                        Load More <i class="ri-arrow-down-s-line ms-1"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block javascript %}
<script src="{{ url_for('static', path='/js/notifications.js') }}"></script>
{% endblock %}
